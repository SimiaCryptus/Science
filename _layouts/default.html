<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ 'assets/css/style.css' | relative_url }}">
  <link rel="icon" type="image/x-icon" href="{{ 'favicon.ico' | relative_url }}">
</head>
<body>
  <!-- Matrix Rain Effect -->
  <div class="matrix-rain" id="matrixRain"></div>
  <!-- Floating Particles -->
  <div class="particle-field" id="particleField"></div>
  
  {% include header.html %}
  <main class="container">
    {{ content }}
  </main>
  {% include footer.html %}
  <!-- JavaScript for Effects -->
  <script>
    // Matrix Rain Effect
    function createMatrixRain() {
      const matrixContainer = document.getElementById('matrixRain');
      if (!matrixContainer) return;
      // Clear any existing content
      matrixContainer.innerHTML = '';
      
      
      const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
      
      
      
      // Calculate number of columns based on screen width
      const numColumns = Math.floor(window.innerWidth / 20);
      
      for (let i = 0; i < numColumns; i++) {
        const column = document.createElement('div');
        column.className = 'matrix-column';
        
        column.style.left = (i * 20) + 'px';
        column.style.animationDuration = (Math.random() * 4 + 3) + 's';
        column.style.animationDelay = Math.random() * 2 + 's';
        
        let text = '';
        const numChars = Math.floor(window.innerHeight / 20);
        for (let j = 0; j < numChars; j++) {
          text += chars[Math.floor(Math.random() * chars.length)] + '\n';
        }
        column.textContent = text;
        matrixContainer.appendChild(column);
      }
      
      // Refresh columns periodically
      setInterval(() => {
        const columns = matrixContainer.querySelectorAll('.matrix-column');
        columns.forEach(column => {
          if (Math.random() > 0.95) {
            let text = '';
            const numChars = Math.floor(window.innerHeight / 20);
            for (let j = 0; j < numChars; j++) {
              text += chars[Math.floor(Math.random() * chars.length)] + '\n';
            }
            column.textContent = text;
          }
        });
      }, 150);
    }
    // Floating Particles
    function createParticles() {
      const particleContainer = document.getElementById('particleField');
      setInterval(() => {
        if (particleContainer.children.length < 20) {
          const particle = document.createElement('div');
          particle.className = 'particle';
          particle.style.left = Math.random() * 100 + '%';
          particle.style.animationDuration = (Math.random() * 10 + 5) + 's';
          particleContainer.appendChild(particle);
          setTimeout(() => {
            if (particle.parentNode) {
              particle.parentNode.removeChild(particle);
            }
          }, 15000);
        }
      }, 500);
    }
    // Initialize effects when page loads
    document.addEventListener('DOMContentLoaded', function() {
      createMatrixRain();
      createParticles();
      // Add glitch effect to random text elements
      const textElements = document.querySelectorAll('h1, h2, h3');
      textElements.forEach(el => {
        if (Math.random() > 0.7) {
          el.classList.add('glitch-text');
          el.setAttribute('data-text', el.textContent);
        }
      });
    });
  </script>
</body>
</html>
