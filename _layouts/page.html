<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="format-detection" content="telephone=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <!-- Dynamic title generation -->
  <title>
    {%- if page.meta_title -%}
      {{ page.meta_title | escape }}
    {%- elsif page.title -%}
      {{ page.title | escape }} | {{ site.title | escape }}
    {%- else -%}
      {{ site.title | escape }}
    {%- endif -%}
  </title>
  
  <!-- SEO and metadata -->
  {% include seo_head.html %}
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body class="{% if page.layout %}layout-{{ page.layout }}{% endif %} {% if page.category %}category-{{ page.category | slugify }}{% endif %} {% if page.status %}status-{{ page.status }}{% endif %}">
  <!-- Skip to content for accessibility -->
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <!-- Header with dynamic navigation -->
  <header class="site-header" role="banner">
    <div class="wrapper">
      <a class="site-title" rel="author" href="{{ '/' | relative_url }}">
        {{ site.title | escape }}
      </a>
      <!-- Dynamic navigation -->
      {% include dynamic_nav.html %}
    </div>
  </header>
  <!-- Breadcrumbs -->
  {% unless page.hide_breadcrumbs %}
    {% include breadcrumbs.html %}
  {% endunless %}
  <!-- Main content area -->
  <main id="main-content" class="page-content" aria-label="Content">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>
  <!-- Footer -->
  {% include footer.html %}
  <!-- JavaScript -->
  <!-- Touch interactions for mobile -->
</body>
</html>
