# _config.yml
title: Fractal Thought Engine
tagline: "Where consciousness meets computation at the edge of the possible"
description: "A Journal of Speculative Science"
baseurl: "/Science" # The subpath of your site, e.g. /blog
url: "https://simiacryptus.github.io" # The base hostname & protocol for your site (leave empty for local development)
lang: en
markdown: kramdown
theme: minima
highlighter: rouge
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - .gitignore
  - .idea/
  - Science.iml
  - .logs/
  - .git/
  - .gitignore
  - README.md
  - LICENSE
# Override default robots.txt generation
include:
  - robots.txt

# Consolidated list of plugins
plugins:
  - jekyll-feed
  - jekyll-paginate
# Pagination
paginate: 10
paginate_path: "/blog/page:num/"
collections:
  - jekyll-seo-tag

# Feed settings
feed:
  path: feed.xml
# Image settings
image_path: "/assets/images"
logo: "/assets/images/fractal_thought_engine_logo.png"


# SEO settings
twitter:
  username: yourusername
  card: summary
# Robots.txt settings - allow all crawlers full access
webrick:
  headers:
    'X-Robots-Tag': 'index, follow'
# Configure robots.txt via jekyll-seo-tag
# SEO and robots configuration
google_site_verification: # Add your verification code if needed

name: Journal of Speculative Science
links:
  - https://twitter.com/yourusername
  - https://github.com/yourusername
social:
    sort_by: date
# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Human-AI Collaboration"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "social"
    values:
      layout: "page"
      category: "Social Sciences"
  - scope:
      path: ""
      type: "scifi"
    values:
      layout: "page"
      category: "SciFi Concepts"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "page"
      category: "Projects"
  - scope:
      path: ""
      type: "creative_writing"
    values:
      layout: "page"
      category: "Creative Writing"