# _config.yml
title: NEURAL MATRIX ARCHIVES
tagline: JACKING INTO THE REALITY STREAM SINCE 1999
description: CLASSIFIED RESEARCH FILES - QUANTUM ENCRYPTED - UNAUTHORIZED ACCESS MONITORED
baseurl: "/Science" # The subpath of your site, e.g. /blog
url: "" # The base hostname & protocol for your site, e.g. https://username.github.io
markdown: kramdown
highlighter: rouge
theme: jekyll-theme-minimal

exclude:
  - Gemfile
  - Gemfile.lock
  - .idea/
  - Science.iml
  - .logs/
  - .git/
  - .gitignore

# Configure defaults for pages
# Add 'defaults' key and proper indentation
defaults:
  - scope:
      path: ""
    values:
      layout: "page"

# Consolidated list of plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-readme-index