# _config.yml
title: Science Project Showcase
description: A showcase of research and ideas from the Science project repository.
baseurl: "/Science" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site
markdown: kramdown
highlighter: rouge
theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
theme: jekyll-theme-minimal

exclude:
  - Gemfile
  - Gemfile.lock
  - .idea/
  - Science.iml
  - .logs/
  - .git/
  - .gitignore

# Configure defaults for pages
  - scope:
      path: ""
    values:
      layout: "page"

# Plugin to convert README.md to index.html
plugins:
  - jekyll-readme-index