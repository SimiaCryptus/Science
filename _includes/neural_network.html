<div class="neural-network" id="neuralNetwork">
  <!-- Nodes and connections will be generated by JavaScript -->
</div>

<script>
  function createNeuralNetwork() {
    const container = document.getElementById('neuralNetwork');
    if (!container) return;
    
    // Clear existing elements
    container.innerHTML = '';
    // Create SVG for better performance
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('width', '100%');
    svg.setAttribute('height', '400');
    svg.setAttribute('viewBox', '0 0 800 400');
    container.appendChild(svg);
    
    
    // Create nodes with SVG circles
    const nodes = [];
    for (let i = 0; i < 15; i++) {
      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      const x = Math.random() * 700 + 50;
      const y = Math.random() * 300 + 50;
      
      circle.setAttribute('cx', x);
      circle.setAttribute('cy', y);
      circle.setAttribute('r', '8');
      circle.setAttribute('class', 'neural-node');
      circle.style.animationDelay = Math.random() * 2 + 's';
      
      svg.appendChild(circle);
      nodes.push({ x, y, element: circle });
    }
    
    // Create connections between nearby nodes
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const distance = Math.sqrt(
          Math.pow(nodes[i].x - nodes[j].x, 2) + 
          Math.pow(nodes[i].y - nodes[j].y, 2)
        );
        
        if (distance < 150 && Math.random() > 0.7) {
          const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line.setAttribute('x1', nodes[i].x);
          line.setAttribute('y1', nodes[i].y);
          line.setAttribute('x2', nodes[j].x);
          line.setAttribute('y2', nodes[j].y);
          line.setAttribute('class', 'neural-connection');
          line.style.animationDelay = Math.random() * 3 + 's';
          
          svg.insertBefore(line, svg.firstChild);
        }
      }
    }
  }
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', createNeuralNetwork);
  } else {
    createNeuralNetwork();
  }
</script>
