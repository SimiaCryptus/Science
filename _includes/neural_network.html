<div class="neural-network" id="neuralNetwork">
  <!-- Nodes and connections will be generated by JavaScript -->
</div>

<script>
  function createNeuralNetwork() {
    const container = document.getElementById('neuralNetwork');
    if (!container) return;
    // Clear existing elements
    container.innerHTML = '';
    
    
    // Create nodes
    for (let i = 0; i < 15; i++) {
      const node = document.createElement('div');
      node.className = 'neural-node';
      node.style.left = Math.random() * 90 + '%';
      node.style.top = Math.random() * 80 + '%';
      node.style.animationDelay = Math.random() * 2 + 's';
      container.appendChild(node);
    }
    
    // Create connections
    for (let i = 0; i < 8; i++) {
      const connection = document.createElement('div');
      connection.className = 'neural-connection';
      connection.style.left = Math.random() * 80 + '%';
      connection.style.top = Math.random() * 80 + '%';
      connection.style.width = Math.random() * 100 + 50 + 'px';
      connection.style.transform = 'rotate(' + Math.random() * 360 + 'deg)';
      connection.style.animationDelay = Math.random() * 3 + 's';
      container.appendChild(connection);
    }
  }
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', createNeuralNetwork);
  } else {
    createNeuralNetwork();
  }
</script>
