<!-- Critical CSS Preload -->
<link rel="preload" href="{{ '/assets/css/critical.css' | relative_url }}" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="{{ '/assets/css/critical.css' | relative_url }}"></noscript>

<!-- DNS Prefetch for Common Domains -->
<link rel="dns-prefetch" href="//fonts.googleapis.com">
<link rel="dns-prefetch" href="//fonts.gstatic.com">
<link rel="dns-prefetch" href="//www.google-analytics.com">
<link rel="dns-prefetch" href="//www.googletagmanager.com">

<!-- Preconnect for Critical Third-Party Origins -->
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<!-- Resource Hints for Navigation -->
{% if page.related_documents %}
  {% for doc in page.related_documents limit: 3 %}
    <link rel="prefetch" href="{{ doc | relative_url }}">
  {% endfor %}
{% endif %}

{% if page.child_documents %}
  {% for doc in page.child_documents limit: 2 %}
    <link rel="prefetch" href="{{ doc | relative_url }}">
  {% endfor %}
{% endif %}

<!-- Preload Critical Images -->
{% if page.featured_image %}
  <link rel="preload" href="{{ page.featured_image | relative_url }}" as="image">
{% endif %}

<!-- Service Worker Registration -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/sw.js').then(function(registration) {
      console.log('SW registered: ', registration);
    }).catch(function(registrationError) {
      console.log('SW registration failed: ', registrationError);
    });
  });
}
</script>

<!-- Web Vitals Tracking -->
<script>
function getCLS(onPerfEntry) {
  if (onPerfEntry && onPerfEntry instanceof Function) {
    import('web-vitals').then(({getCLS}) => getCLS(onPerfEntry));
  }
}

function getFID(onPerfEntry) {
  if (onPerfEntry && onPerfEntry instanceof Function) {
    import('web-vitals').then(({getFID}) => getFID(onPerfEntry));
  }
}

function getFCP(onPerfEntry) {
  if (onPerfEntry && onPerfEntry instanceof Function) {
    import('web-vitals').then(({getFCP}) => getFCP(onPerfEntry));
  }
}

function getLCP(onPerfEntry) {
  if (onPerfEntry && onPerfEntry instanceof Function) {
    import('web-vitals').then(({getLCP}) => getLCP(onPerfEntry));
  }
}

function getTTFB(onPerfEntry) {
  if (onPerfEntry && onPerfEntry instanceof Function) {
    import('web-vitals').then(({getTTFB}) => getTTFB(onPerfEntry));
  }
}

// Report Web Vitals
function reportWebVitals(metric) {
  // Send to analytics
  if (typeof gtag !== 'undefined') {
    gtag('event', metric.name, {
      event_category: 'Web Vitals',
      event_label: metric.id,
      value: Math.round(metric.name === 'CLS' ? metric.value * 1000 : metric.value),
      non_interaction: true,
    });
  }
}

getCLS(reportWebVitals);
getFID(reportWebVitals);
getFCP(reportWebVitals);
getLCP(reportWebVitals);
getTTFB(reportWebVitals);
</script>
